{% load static %}
<!doctype html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cinnamon{% endblock %}</title>

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <!-- Favicons por tema -->
    <link rel="icon" id="favicon" type="image/png" href="{% static 'img/simbolo-logo-darkmode.png' %}">

    <!-- Previne FOUC: aplica tema salvo e favicon correto antes do primeiro render -->
    <script>
        (function(){
            try {
                var t = localStorage.getItem('cinnamon-theme') || 'light';
                document.documentElement.setAttribute('data-theme', t);
                var favicon = document.getElementById('favicon');
                if (favicon) {
                    favicon.href = t === 'light'
                        ? '{% static "img/simbolo-logo-lightmode.png" %}'
                        : '{% static "img/simbolo-logo-darkmode.png" %}';
                }
            } catch(e) {}
        })();
    </script>

    <!-- JS principal -->
    <script src="{% static 'js/main.js' %}" defer></script>

    {% block extra_head %}{% endblock %}
</head>
<body>

    {% block conteudo %}{% endblock %}

    <!-- Bootstrap 5 JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
